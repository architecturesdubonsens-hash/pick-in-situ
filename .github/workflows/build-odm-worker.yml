name: Build & Push ODM Worker

on:
  push:
    paths:
      - 'runpod-worker/**'
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: |
          # Incrémenter automatiquement : lire le dernier tag v* sur Docker Hub
          LATEST=$(curl -s "https://hub.docker.com/v2/repositories/pickinsitu/bc-archi-odm/tags?page_size=100" \
            | grep -oP '"name":"\Kv\d+' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v1"
          else
            N=$(echo $LATEST | tr -d 'v')
            NEXT="v$((N + 1))"
          fi
          echo "tag=$NEXT" >> $GITHUB_OUTPUT
          echo "Building tag: $NEXT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./runpod-worker
          platforms: linux/amd64
          push: true
          tags: |
            pickinsitu/bc-archi-odm:${{ steps.version.outputs.tag }}
            pickinsitu/bc-archi-odm:latest
            ghcr.io/${{ github.repository_owner }}/bc-archi-odm:${{ steps.version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/bc-archi-odm:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          echo "## ✅ Image publiée" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker Hub** : \`pickinsitu/bc-archi-odm:${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **GHCR** : \`ghcr.io/${{ github.repository_owner }}/bc-archi-odm:${{ steps.version.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Plateforme** : linux/amd64" >> $GITHUB_STEP_SUMMARY
          echo "- **Action suivante** : mettre à jour l'endpoint RunPod \`alfkh0yfkkfukq\` avec \`ghcr.io/${{ github.repository_owner }}/bc-archi-odm:latest\`" >> $GITHUB_STEP_SUMMARY
